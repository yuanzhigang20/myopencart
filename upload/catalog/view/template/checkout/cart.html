{{ header }}
<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-xl-11">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-3 mb-4">
        <div>
          <span class="badge text-bg-primary mb-2">Checkout</span>
          <h1 class="fw-bold mb-0">{{ heading_title }}</h1>
        </div>
        <a href="{{ breadcrumbs[0].href }}" class="btn btn-outline-primary">Continue Shopping</a>
      </div>
      <div id="shopping-cart" class="card border-0 shadow-sm rounded-4 p-3 p-lg-4">{{ list|raw }}</div>
    </div>
  </div>
</main>
{{ footer }}
