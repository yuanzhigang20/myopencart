<fieldset>
  <legend>{{ heading_title }}</legend>
  <div class="input-group">
    <span class="input-group-text"><i class="fa fa-credit-card"></i></span>
    <input type="text" name="payment_method" value="{{ payment_method }}" placeholder="{{ entry_payment_method }}" id="input-payment-method" class="form-control" readonly>
    <button type="button" id="button-payment-methods" class="btn btn-primary">{{ button_choose }}</button>
  </div>
  <input type="hidden" name="code" value="{{ code }}" id="input-payment-code">
  <div id="error-payment-method" class="invalid-feedback d-block"></div>
</fieldset>
<br>
<div class="mb-2">
  <label for="input-comment" class="form-label"><strong>{{ text_comments }}</strong></label>
  <textarea name="comment" rows="4" id="input-comment" class="form-control">{{ comment }}</textarea>
</div>
{% if text_agree %}
  <div class="form-check text-end">
    <input type="checkbox" name="agree" value="1" id="input-checkout-agree" class="form-check-input float-none me-2" {% if agree %}checked{% endif %}>
    <label for="input-checkout-agree" class="form-check-label">{{ text_agree|raw }}</label>
  </div>
{% endif %}
