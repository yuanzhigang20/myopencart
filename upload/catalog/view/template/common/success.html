{{ header }}
<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
      <div class="card border-0 shadow-sm rounded-4 text-center overflow-hidden">
        <div class="card-body p-5">
          <div class="display-4 text-success mb-3"><i class="fa-solid fa-circle-check"></i></div>
          <h1 class="fw-bold mb-3">{{ heading_title }}</h1>
          <div class="lead text-muted mb-4">{{ text_message|raw }}</div>
          <a href="{{ continue }}" class="btn btn-primary btn-lg px-5">{{ button_continue }}</a>
        </div>
      </div>
    </div>
  </div>
</main>
{{ footer }}
